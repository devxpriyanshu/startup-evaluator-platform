[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/scoring"
  to = "/scoring-mechanism/"
  status = 301

[[redirects]]
  from = "/scoring/*"
  to = "/scoring-mechanism/:splat"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
